services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cipp-contracts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cipp_contracts}
      POSTGRES_USER: ${POSTGRES_USER:-cipp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cipp} -d ${POSTGRES_DB:-cipp_contracts}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
